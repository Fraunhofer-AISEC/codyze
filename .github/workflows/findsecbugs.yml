name: "FindSecBugs"

on:
  push:
    branches:
      - rh/action-test
      #- main
  #pull_request:
    #branches:
      #- '**'
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
      - name: Build
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build -x check --parallel -Pversion=0.0.0
      - name: ls
        run: |
          ls -la
          cd build/
          ls -la
          cd libs/
          ls -la
      - name: Run FindSecBugs
        uses: advanced-security/spotbugs-findsecbugs-action@v1
        with:
          spotbugs_target: 'build/'
          spotbugs_filename_glob: '*.jar'
          java_distribution: "temurin"
          java_version: "17"